# Hypridle — idle management for display power saving.
# Pairs with hyprlock (screen lock) and niri's built-in power-off-monitors
# action (niri doesn't implement wlr-output-power-management-v1, so wlopm
# doesn't work). Niri auto-powers-on monitors on user input.
#
# Dim at 4 min, display sleep (lock + power-off) at 5 min.

general {
    lock_cmd = hyprlock --config $HOME/dotfiles/nixos/niri/hyprlock.conf
    unlock_cmd = pkill hyprlock
}

# 4 min: dim displays to 20% (laptops with backlight; no-op on desktop
# external monitors that lack a backlight sysfs device).
listener {
    timeout = 240
    on-timeout = brightnessctl -s set 20%
    on-resume = brightnessctl -r
}

# 5 min: lock screen + power off monitors.
# hyprlock launches first, then niri powers off all outputs. On any input
# niri auto-powers-on and the lock screen is already visible.
# NIRI_SOCKET isn't exported to children, so we discover it via glob.
listener {
    timeout = 300
    on-timeout = sh -c 'hyprlock --config $HOME/dotfiles/nixos/niri/hyprlock.conf & sleep 0.5 && NIRI_SOCKET=$(ls $XDG_RUNTIME_DIR/niri.wayland-1.*.sock 2>/dev/null | head -1) niri msg action power-off-monitors'
    on-resume = sh -c 'NIRI_SOCKET=$(ls $XDG_RUNTIME_DIR/niri.wayland-1.*.sock 2>/dev/null | head -1) niri msg action power-on-monitors && swww img "$HOME/dotfiles/nixos/niri/wallpapers/tj-holowaychuk-mist-over-banff-ave.jpg" --transition-type none'
}
