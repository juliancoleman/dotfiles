# Hypridle — idle management for display power saving.
# Pairs with hyprlock (screen lock) and wlopm (Wayland DPMS).
# Dim at 4 min, display sleep (DPMS off + lock) at 5 min.

general {
    lock_cmd = hyprlock --config $HOME/dotfiles/nixos/niri/hyprlock.conf
    unlock_cmd = pkill hyprlock
    before_sleep_cmd = wlopm --off
    after_sleep_cmd = wlopm --on
}

# 4 min: dim displays to 20% (laptops with backlight; no-op on desktop
# external monitors that lack a backlight sysfs device).
listener {
    timeout = 240
    on-timeout = brightnessctl -s set 20%
    on-resume = brightnessctl -r
}

# 5 min: lock screen + DPMS off (display sleep).
# hyprlock runs in the background so wlopm can turn the output off
# immediately; on resume wlopm turns it back on and the lock screen
# is already visible.
listener {
    timeout = 300
    on-timeout = sh -c 'hyprlock --config $HOME/dotfiles/nixos/niri/hyprlock.conf & sleep 0.5 && wlopm --off'
    on-resume = wlopm --on
}
