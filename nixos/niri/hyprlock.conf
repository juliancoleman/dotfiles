background {
    monitor =
    path = /home/julian/dotfiles/nixos/niri/wallpapers/tj-holowaychuk-mist-over-banff-ave.jpg
    blur_passes = 2
    blur_size = 5
    contrast = 1.0
    brightness = 0.9
    vibrancy = 0.17
}

label {
    monitor =
    text = $TIME12
    font_size = 72
    font_family = IBM Plex Sans
    color = rgb(ffffff)
    shadow_color = rgb(000000cc)
    shadow_passes = 3
    shadow_size = 3
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    font_size = 20
    font_family = IBM Plex Sans
    color = rgb(ffffffaa)
    shadow_color = rgb(000000cc)
    shadow_passes = 2
    shadow_size = 2
    position = 0, 30
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 160, 32
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.25
    dots_center = true
    outer_color = rgb(33ccff)
    inner_color = rgb(00000080)
    font_color = rgb(ffffff)
    fade_on_empty = false
    placeholder_text =
    hide_input = false
    position = 0, -40
    halign = center
    valign = center
}
