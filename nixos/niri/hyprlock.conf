background {
    monitor =
    path = /home/julian/dotfiles/nixos/niri/wallpapers/tj-holowaychuk-mist-over-banff-ave.jpg
    blur_passes = 2
    blur_size = 5
    contrast = 1.0
    brightness = 0.9
    vibrancy = 0.17
}

input-field {
    monitor =
    size = 240, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(33ccff)
    inner_color = rgb(00000050)
    font_color = rgb(ffffff)
    fade_on_empty = true
    placeholder_text = <i>Enter password</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}
